<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker | DNC Premium</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(30, 41, 59, 0.4);
            --surface-hover: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(56, 189, 248, 0.3);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --success: #10b981;
            --danger: #f43f5e;
            
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(56, 189, 248, 0.15);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.04), transparent 25%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3 { font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
        
        /* Layout */
        .container {
            max-w-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            max-width: 1200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .brand-title {
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-glass);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--border-glow);
            background: var(--surface-hover);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
        }
        .card.balance::before { background: var(--accent-gradient); }
        .card.income::before { background: var(--success); }
        .card.expense::before { background: var(--danger); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .card-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .card.income .card-value { color: var(--success); }
        .card.expense .card-value { color: var(--danger); }

        /* Main Content Split */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }

        /* Form Area */
        .form-section {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 2rem;
            box-shadow: var(--shadow-glass);
            height: fit-content;
        }

        .form-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }

        .radio-group {
            display: flex;
            gap: 1rem;
        }

        .radio-label {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .radio-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-weight: 500;
            color: var(--text-secondary);
        }

        .radio-label input:checked ~ .radio-button {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .radio-label.income input:checked ~ .radio-button {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .radio-label.expense input:checked ~ .radio-button {
            border-color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* List Area */
        .list-section {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 2rem;
            box-shadow: var(--shadow-glass);
            display: flex;
            flex-direction: column;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            font-size: 0.875rem;
        }

        .btn-refresh:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            max-height: 600px;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        .transaction-list::-webkit-scrollbar { width: 6px; }
        .transaction-list::-webkit-scrollbar-track { background: transparent; }
        .transaction-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .transaction-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .transaction-item:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(4px);
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tx-icon.income { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .tx-icon.expense { background: rgba(244, 63, 94, 0.1); color: var(--danger); }

        .tx-details h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tx-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            align-items: center;
        }

        .tx-amount {
            font-family: 'Oswald', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .tx-amount.income { color: var(--success); }
        .tx-amount.expense { color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i {
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background: var(--surface-hover);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .loading-overlay .spinner {
            display: block;
            width: 30px; height: 30px;
            border-width: 3px;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="wallet" style="color: white; width: 20px; height: 20px;"></i>
                </div>
                <h1 class="brand-title">DNC FINANCE OS</h1>
            </div>
            <div>
                <span style="font-size: 0.875rem; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color);">
                    <i data-lucide="shield-check" style="width: 14px; height: 14px; display: inline; vertical-align: text-bottom; margin-right: 4px; color: var(--success);"></i> Premium Secured
                </span>
            </div>
        </header>

        <!-- Dashboard Cards -->
        <div class="dashboard-grid">
            <div class="card balance">
                <div class="card-header">
                    <span>Tổng Số Dư</span>
                    <i data-lucide="credit-card" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalBalance">0đ</div>
            </div>
            <div class="card income">
                <div class="card-header">
                    <span>Tổng Thu</span>
                    <i data-lucide="arrow-down-right" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalIncome">0đ</div>
            </div>
            <div class="card expense">
                <div class="card-header">
                    <span>Tổng Chi</span>
                    <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalExpense">0đ</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            
            <!-- Left: Form -->
            <section class="form-section">
                <h2 class="form-title"><i data-lucide="plus-circle" class="text-accent"></i> Ghi Nhận Giao Dịch</h2>
                
                <form id="financeForm">
                    <div class="form-group">
                        <label class="form-label">Loại Giao Dịch</label>
                        <div class="radio-group">
                            <label class="radio-label income">
                                <input type="radio" name="type" value="Thu" required>
                                <div class="radio-button">
                                    <i data-lucide="arrow-down-circle" class="w-4 h-4"></i> Khoản Thu
                                </div>
                            </label>
                            <label class="radio-label expense">
                                <input type="radio" name="type" value="Chi" checked required>
                                <div class="radio-button">
                                    <i data-lucide="arrow-up-circle" class="w-4 h-4"></i> Khoản Chi
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="date">Ngày Giao Dịch</label>
                        <input type="date" id="date" name="date" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="category">Hạng Mục</label>
                        <select id="category" name="category" class="form-control" required>
                            <option value="" disabled selected>-- Chọn hạng mục --</option>
                            <optgroup label="Chi Phí">
                                <option value="Ăn uống">Ăn uống</option>
                                <option value="Di chuyển">Di chuyển</option>
                                <option value="Hóa đơn">Hóa đơn & Tiện ích</option>
                                <option value="Mua sắm">Mua sắm</option>
                                <option value="Giải trí">Giải trí</option>
                                <option value="Khác">Khác (Chi)</option>
                            </optgroup>
                            <optgroup label="Thu Nhập">
                                <option value="Lương">Tiền Lương</option>
                                <option value="Kinh doanh">Kinh doanh / Dự án</option>
                                <option value="Đầu tư">Đầu tư</option>
                                <option value="Khác">Khác (Thu)</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="amount">Số Tiền (VNĐ)</label>
                        <input type="number" id="amount" name="amount" class="form-control" placeholder="Ví dụ: 500000" min="0" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="note">Ghi Chú (Tuỳ chọn)</label>
                        <textarea id="note" name="note" class="form-control" rows="3" placeholder="Chi tiết giao dịch..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">Lưu Giao Dịch</span>
                        <div class="spinner" id="submitSpinner"></div>
                    </button>
                </form>
            </section>

            <!-- Right: List -->
            <section class="list-section">
                <div class="loading-overlay" id="listLoading">
                    <div class="spinner"></div>
                </div>
                
                <div class="list-header">
                    <h2 class="form-title" style="margin:0;"><i data-lucide="list" class="text-accent"></i> Giao Dịch Gần Đây</h2>
                    <button class="btn-refresh" onclick="fetchTransactions()">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Làm Mới
                    </button>
                </div>

                <div class="transaction-list" id="transactionList">
                    <!-- Javascript sẽ render danh sách vào đây -->
                    <div class="empty-state">
                        <i data-lucide="inbox" class="w-12 h-12"></i>
                        <p>Đang tải dữ liệu...</p>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Application Script -->
    <script>
        // Khởi tạo Icons
        lucide.createIcons();

        // CẤU HÌNH API GÓC TỪ GOOGLE APPS SCRIPT
        // Bạn cần thay thế chuỗi này bằng Web App URL của Apps Script vừa tạo
        const API_URL = "https://script.google.com/macros/s/AKfycbwP_wB_C3jJ2B62p_E4j0S6322bO4tN_lH_/exec"; // PLACEHOLDER

        // Format tiền tệ VNĐ
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        // Format Date (YYYY-MM-DD to DD/MM/YYYY)
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('vi-VN');
            } catch (e) {
                return dateStr;
            }
        };

        // Set ngày hiện tại cho form input
        document.getElementById('date').valueAsDate = new Date();

        // Xử lý thông báo Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? 'check-circle-2' : 'alert-circle';
            toast.innerHTML = `
                <i data-lucide="${icon}"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove sau 4s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Lấy danh sách giao dịch
        async function fetchTransactions() {
            if (API_URL.includes("PLACEHOLDER")) {
                document.getElementById('transactionList').innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="alert-triangle" class="w-12 h-12" style="color:var(--danger)"></i>
                        <p>Vui lòng cập nhật API_URL trong mã nguồn (index.html).</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            const loader = document.getElementById('listLoading');
            loader.classList.add('active');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    renderDashboard(result.data);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showToast("Lỗi khi tải dữ liệu: " + error.message, "error");
            } finally {
                loader.classList.remove('active');
            }
        }

        // Render dữ liệu ra giao diện
        function renderDashboard(transactions) {
            let totalIncome = 0;
            let totalExpense = 0;
            
            const listContainer = document.getElementById('transactionList');
            listContainer.innerHTML = '';

            if (!transactions || transactions.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="inbox" class="w-12 h-12"></i>
                        <p>Chưa có giao dịch nào.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            transactions.forEach(tx => {
                const amount = Number(tx.amount) || 0;
                const isIncome = tx.type === 'Thu';
                
                if (isIncome) totalIncome += amount;
                else totalExpense += amount;

                // Create List Item
                const iconName = isIncome ? 'arrow-down-circle' : 'arrow-up-circle';
                const txClass = isIncome ? 'income' : 'expense';
                const sign = isIncome ? '+' : '-';

                const itemHTML = `
                    <div class="transaction-item">
                        <div class="tx-left">
                            <div class="tx-icon ${txClass}">
                                <i data-lucide="${iconName}"></i>
                            </div>
                            <div class="tx-details">
                                <h4>${tx.category || 'Không phân loại'}</h4>
                                <div class="tx-meta">
                                    <span><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${formatDate(tx.date)}</span>
                                    ${tx.note ? `<span>• ${tx.note}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="tx-amount ${txClass}">
                            ${sign}${formatCurrency(amount)}
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', itemHTML);
            });

            // Update Cards
            const balance = totalIncome - totalExpense;
            document.getElementById('totalIncome').innerText = formatCurrency(totalIncome);
            document.getElementById('totalExpense').innerText = formatCurrency(totalExpense);
            document.getElementById('totalBalance').innerText = formatCurrency(balance);
            
            // Xử lý màu số dư
            const balanceEl = document.getElementById('totalBalance');
            if (balance < 0) balanceEl.style.color = 'var(--danger)';
            else if (balance > 0) balanceEl.style.color = 'var(--success)';
            else balanceEl.style.color = 'var(--text-primary)';

            lucide.createIcons();
        }

        // Xử lý Submit Form
        document.getElementById('financeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (API_URL.includes("PLACEHOLDER")) {
                showToast("Vui lòng cập nhật API_URL trước khi lưu!", "error");
                return;
            }

            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.querySelector('.btn-text');
            const spinner = document.getElementById('submitSpinner');

            // Lấy dữ liệu form
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // UI Loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error("Không thể kết nối đến máy chủ");

                const result = await response.json();
                
                if (result.status === 'success') {
                    showToast(result.message, 'success');
                    // Reset form fields except date
                    const currDate = document.getElementById('date').value;
                    form.reset();
                    document.getElementById('date').value = currDate;
                    // Tải lại dữ liệu mới
                    fetchTransactions();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Submit Error:", error);
                showToast("Lỗi: " + error.message, 'error');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });

        // Tải dữ liệu lần đầu khi trang load xong
        document.addEventListener('DOMContentLoaded', fetchTransactions);
    </script>
</body>
</html>
