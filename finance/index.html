<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance OS | DNC Operator</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons & Charts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS Variables - Based on About-Me Premium Theme */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --surface-color: rgba(30, 41, 59, 0.4);
            --surface-hover: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(to right, #38bdf8, #8b5cf6);
            --success: #10b981;
            --danger: #f43f5e;
            
            --radius-md: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            display: flex;
        }

        h1, h2, h3, h4, h5 { font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; bottom: 0; left: 0;
            z-index: 50;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .brand-icon {
            width: 40px; height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white;
        }

        .brand-title {
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .nav-item.active {
            border-left: 3px solid var(--accent);
        }

        /* --- Main Content --- */
        .main-wrapper {
            margin-left: 260px;
            flex: 1;
            padding: 2.5rem 3rem;
            max-width: 1400px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Top Stats Grid */
        .top-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        /* Layouts */
        .split-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 500; }
        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
        }
        .form-control:focus { border-color: var(--accent); }
        
        .radio-group { display: flex; gap: 1rem; }
        .radio-label { flex: 1; position: relative; cursor: pointer; }
        .radio-label input { position: absolute; opacity: 0; cursor: pointer; }
        .radio-button {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); color: var(--text-secondary); transition: var(--transition); font-weight: 500;
        }
        .radio-label input:checked ~ .radio-button { border-color: var(--accent); color: var(--text-primary); background: rgba(56, 189, 248, 0.1); }
        .radio-label.income input:checked ~ .radio-button { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .radio-label.expense input:checked ~ .radio-button { border-color: var(--danger); color: var(--danger); background: rgba(244, 63, 94, 0.1); }
        
        .btn-submit {
            width: 100%; padding: 1rem; background: var(--accent-gradient); color: white;
            border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2); transition: var(--transition);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(56, 189, 248, 0.3); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Lists & Tables */
        .section-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);
        }

        .tx-list {
            display: flex; flex-direction: column; gap: 0.75rem; max-height: 500px; overflow-y: auto; padding-right: 0.5rem;
        }

        .tx-list::-webkit-scrollbar { width: 6px; }
        .tx-list::-webkit-scrollbar-track { background: transparent; }
        .tx-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .tx-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: rgba(15,23,42,0.4); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); transition: var(--transition);
        }
        .tx-item:hover { background: rgba(30,41,59,0.8); transform: translateX(4px); }
        
        .tx-left { display: flex; align-items: center; gap: 1rem; }
        .tx-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .tx-icon.income { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .tx-icon.expense { background: rgba(244, 63, 94, 0.1); color: var(--danger); }
        
        .tx-amount { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 600; }
        .tx-amount.income { color: var(--success); }
        .tx-amount.expense { color: var(--danger); }

        .btn-outline {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);
            padding: 0.5rem 1rem; border-radius: var(--radius-sm); cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; transition: var(--transition);
        }
        .btn-outline:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

        /* Toast & Spinners */
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 100; display: flex; flex-direction: column; gap: 1rem; }
        .toast {
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--border-color);
            color: white; padding: 1rem 1.5rem; border-radius: var(--radius-sm);
            display: flex; align-items: center; gap: 0.75rem; transform: translateX(120%); transition: transform 0.4s;
        }
        .toast.show { transform: translateX(0); }
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        
        .loading-overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .loading-overlay .spinner { display: block; width: 30px; height: 30px; }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 1.5rem 0.5rem; align-items: center; }
            .brand-title { display: none; }
            .nav-item span { display: none; }
            .nav-item { justify-content: center; padding: 0.75rem; }
            .main-wrapper { margin-left: 80px; }
            .top-stats { grid-template-columns: 1fr; }
            .split-layout { grid-template-columns: 1fr; }
            .report-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i data-lucide="wallet" class="w-5 h-5"></i></div>
            <h1 class="brand-title">FINANCE OS</h1>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchTab('dashboard')">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Bảng Điều Khiển</span>
            </div>
            <div class="nav-item" onclick="switchTab('reports')">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span>Báo Cáo Phân Tích</span>
            </div>
        </nav>
    </aside>

    <!-- Main Wrapper -->
    <main class="main-wrapper">
        
        <!-- Tab: Dashboard -->
        <div id="dashboard" class="tab-content active">
            <!-- Stats -->
            <div class="top-stats">
                <div class="glass-panel stat-card">
                    <div class="stat-label">Tổng Số Dư <i data-lucide="credit-card" class="w-4 h-4"></i></div>
                    <div class="stat-value" id="totalBalance">0đ</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-label">Tổng Thu <i data-lucide="arrow-down-right" class="w-4 h-4 text-success"></i></div>
                    <div class="stat-value text-success" id="totalIncome" style="color: var(--success)">0đ</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-label">Tổng Chi <i data-lucide="arrow-up-right" class="w-4 h-4 text-danger"></i></div>
                    <div class="stat-value text-danger" id="totalExpense" style="color: var(--danger)">0đ</div>
                </div>
            </div>

            <div class="split-layout">
                <!-- Form -->
                <div class="glass-panel" style="padding: 2rem; height: fit-content;">
                    <h2 class="form-title" style="margin-bottom: 1.5rem; font-size: 1.25rem;"><i data-lucide="plus-circle" class="w-5 h-5 inline text-accent"></i> Ghi Nhận Mới</h2>
                    <form id="financeForm">
                        <div class="form-group">
                            <label class="form-label">Loại Giao Dịch</label>
                            <div class="radio-group">
                                <label class="radio-label income">
                                    <input type="radio" name="type" value="Thu" required>
                                    <div class="radio-button"><i data-lucide="plus" class="w-4 h-4"></i> Thu</div>
                                </label>
                                <label class="radio-label expense">
                                    <input type="radio" name="type" value="Chi" checked required>
                                    <div class="radio-button"><i data-lucide="minus" class="w-4 h-4"></i> Chi</div>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ngày Giao Dịch</label>
                            <input type="date" id="date" name="date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hạng Mục</label>
                            <select name="category" class="form-control" required>
                                <option value="" disabled selected>-- Chọn --</option>
                                <optgroup label="Chi Phí">
                                    <option value="Ăn uống">Ăn uống</option>
                                    <option value="Di chuyển">Di chuyển</option>
                                    <option value="Hóa đơn">Hóa đơn</option>
                                    <option value="Mua sắm">Mua sắm</option>
                                    <option value="Khác">Khác (Chi)</option>
                                </optgroup>
                                <optgroup label="Thu Nhập">
                                    <option value="Lương">Lương</option>
                                    <option value="Dự án">Dự án / Freelance</option>
                                    <option value="Đầu tư">Đầu tư</option>
                                    <option value="Khác">Khác (Thu)</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số Tiền (VNĐ)</label>
                            <input type="number" name="amount" class="form-control" placeholder="Ví dụ: 500000" min="0" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ghi Chú</label>
                            <textarea name="note" class="form-control" rows="2" placeholder="Chi tiết..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <span class="btn-text">Lưu Giao Dịch</span>
                            <div class="spinner" id="submitSpinner"></div>
                        </button>
                    </form>
                </div>

                <!-- Recent List -->
                <div class="glass-panel" style="padding: 2rem; position: relative;">
                    <div class="loading-overlay" id="listLoading"><div class="spinner"></div></div>
                    <div class="section-header">
                        <h2 style="font-size: 1.25rem;"><i data-lucide="list" class="w-5 h-5 inline text-accent"></i> Giao Dịch Gần Đây</h2>
                        <button class="btn-outline" onclick="fetchTransactions()">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Làm Mới
                        </button>
                    </div>
                    <div class="tx-list" id="transactionList">
                        <!-- Rendered by JS -->
                        <div style="text-align: center; padding: 2rem; color: var(--text-muted);">Đang tải...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Reports -->
        <div id="reports" class="tab-content">
            <div class="glass-panel" style="padding: 1.5rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h2 style="font-size: 1.25rem;"><i data-lucide="pie-chart" class="w-5 h-5 inline text-accent"></i> Phân Tích Dữ Liệu</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <input type="date" id="filterStartDate" class="form-control" style="width: auto; padding: 0.5rem;">
                    <span>-</span>
                    <input type="date" id="filterEndDate" class="form-control" style="width: auto; padding: 0.5rem;">
                    <button class="btn-submit" onclick="applyFilter()" style="width: auto; padding: 0.5rem 1.5rem; margin: 0;">Lọc</button>
                </div>
            </div>

            <!-- Charts -->
            <div class="report-grid">
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-secondary);">TỔNG QUAN THU CHI</h3>
                    <div style="height: 250px; position: relative;"><canvas id="overviewChart"></canvas></div>
                </div>
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-secondary);">TỶ TRỌNG CHI PHÍ / TIẾT KIỆM</h3>
                    <div style="height: 250px; position: relative; display: flex; justify-content: center;"><canvas id="ratioChart"></canvas></div>
                </div>
            </div>

            <div class="report-grid">
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-secondary);">CƠ CẤU CHI PHÍ</h3>
                    <div style="height: 250px; position: relative;"><canvas id="expenseChart"></canvas></div>
                </div>
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-secondary);">CƠ CẤU THU NHẬP</h3>
                    <div style="height: 250px; position: relative;"><canvas id="incomeChart"></canvas></div>
                </div>
            </div>

            <!-- Breakdown Tables -->
            <div class="report-grid">
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--success);">BẢNG KÊ THU</h3>
                    <div class="tx-list" id="incomeTable" style="max-height: 300px;"></div>
                </div>
                <div class="glass-panel" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: var(--danger);">BẢNG KÊ CHI</h3>
                    <div class="tx-list" id="expenseTable" style="max-height: 300px;"></div>
                </div>
            </div>
        </div>

    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        lucide.createIcons();

        // API URL (Apps Script)
        const API_URL = "https://script.google.com/macros/s/AKfycbwNLNVPwzy5pg7M9-i_fledNhvtMQOGKFLSNmX4tp-0RDJgINEfiZuuVLzETfKVMJcs7A/exec";

        let allTransactions = [];
        let charts = {};

        // Utils
        const formatCurrency = (amt) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amt);
        const formatDate = (ds) => { try { return new Date(ds).toLocaleDateString('vi-VN'); } catch(e){ return ds; } };
        document.getElementById('date').valueAsDate = new Date();

        // Tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            // Re-render charts to fix sizing issue when hidden
            if(tabId === 'reports') {
                applyFilter();
            }
        }

        // Toasts
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle-2' : 'alert-circle'}"></i><span>${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        }

        // Fetch
        async function fetchTransactions() {
            const loader = document.getElementById('listLoading');
            loader.classList.add('active');
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Lỗi kết nối");
                const result = await res.json();
                if (result.status === 'success') {
                    allTransactions = result.data;
                    applyFilter();
                } else throw new Error(result.message);
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                loader.classList.remove('active');
            }
        }

        // Filter
        function applyFilter() {
            const startStr = document.getElementById('filterStartDate').value;
            const endStr = document.getElementById('filterEndDate').value;
            let filtered = allTransactions;
            
            if (startStr) {
                const s = new Date(startStr).getTime();
                filtered = filtered.filter(tx => new Date(tx.date).getTime() >= s);
            }
            if (endStr) {
                const e = new Date(endStr).getTime() + 86400000; 
                filtered = filtered.filter(tx => new Date(tx.date).getTime() < e);
            }

            renderDashboard(filtered);
            renderReports(filtered);
        }

        // Dashboard Render
        function renderDashboard(txs) {
            let tInc = 0, tExp = 0;
            const list = document.getElementById('transactionList');
            list.innerHTML = '';

            if(!txs.length) {
                list.innerHTML = `<div style="text-align: center; padding: 2rem; color: var(--text-muted);">Không có giao dịch</div>`;
                document.getElementById('totalIncome').innerText = '0đ';
                document.getElementById('totalExpense').innerText = '0đ';
                document.getElementById('totalBalance').innerText = '0đ';
                return;
            }

            txs.forEach(tx => {
                const amt = Number(tx.amount) || 0;
                const isInc = tx.type === 'Thu';
                if(isInc) tInc += amt; else tExp += amt;

                list.insertAdjacentHTML('beforeend', `
                    <div class="tx-item">
                        <div class="tx-left">
                            <div class="tx-icon ${isInc ? 'income' : 'expense'}"><i data-lucide="${isInc ? 'arrow-down' : 'arrow-up'}"></i></div>
                            <div>
                                <h4 style="font-weight: 600; margin-bottom: 2px;">${tx.category || 'Khác'}</h4>
                                <div style="font-size: 0.75rem; color: var(--text-muted); display:flex; gap: 10px;">
                                    <span><i data-lucide="calendar" style="width:12px; height:12px; display:inline;"></i> ${formatDate(tx.date)}</span>
                                    ${tx.note ? `<span>• ${tx.note}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="tx-amount ${isInc ? 'income' : 'expense'}">${isInc ? '+' : '-'}${formatCurrency(amt)}</div>
                    </div>
                `);
            });

            document.getElementById('totalIncome').innerText = formatCurrency(tInc);
            document.getElementById('totalExpense').innerText = formatCurrency(tExp);
            document.getElementById('totalBalance').innerText = formatCurrency(tInc - tExp);
            document.getElementById('totalBalance').style.color = (tInc - tExp) < 0 ? 'var(--danger)' : 'var(--text-primary)';
            lucide.createIcons({ root: list });
        }

        // Reports Render
        function renderReports(txs) {
            let tInc = 0, tExp = 0;
            const iMap = {}, eMap = {};

            txs.forEach(tx => {
                const amt = Number(tx.amount) || 0;
                const cat = tx.category || 'Khác';
                if (tx.type === 'Thu') { tInc += amt; iMap[cat] = (iMap[cat]||0) + amt; } 
                else { tExp += amt; eMap[cat] = (eMap[cat]||0) + amt; }
            });

            ['overviewChart', 'expenseChart', 'incomeChart', 'ratioChart'].forEach(id => { if (charts[id]) charts[id].destroy(); });
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = 'Inter';

            charts['overviewChart'] = new Chart(document.getElementById('overviewChart'), {
                type: 'bar',
                data: { labels: ['Thu Nhập', 'Chi Phí', 'Tiết Kiệm'], datasets: [{ data: [tInc, tExp, tInc - tExp], backgroundColor: ['#10b981', '#f43f5e', '#38bdf8'], borderRadius: 4 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts['expenseChart'] = new Chart(document.getElementById('expenseChart'), {
                type: 'bar',
                data: { labels: Object.keys(eMap), datasets: [{ data: Object.values(eMap), backgroundColor: '#f43f5e', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts['incomeChart'] = new Chart(document.getElementById('incomeChart'), {
                type: 'bar',
                data: { labels: Object.keys(iMap), datasets: [{ data: Object.values(iMap), backgroundColor: '#10b981', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts['ratioChart'] = new Chart(document.getElementById('ratioChart'), {
                type: 'doughnut',
                data: { labels: ['Chi Phí', 'Tiết Kiệm'], datasets: [{ data: [tExp, Math.max(0, tInc - tExp)], backgroundColor: ['#f43f5e', '#38bdf8'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });

            const renderTbl = (map, id, isInc) => {
                let html = '';
                Object.entries(map).sort((a,b)=>b[1]-a[1]).forEach(([c, a]) => {
                    html += `<div class="tx-item" style="padding:0.75rem 1rem;"><div style="font-weight:600;">${c}</div><div class="tx-amount ${isInc?'income':'expense'}">${isInc?'+':'-'}${formatCurrency(a)}</div></div>`;
                });
                document.getElementById(id).innerHTML = html || '<p style="color:var(--text-muted)">Không có dữ liệu</p>';
            };
            renderTbl(iMap, 'incomeTable', true);
            renderTbl(eMap, 'expenseTable', false);
        }

        // Submit Form
        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target; const btn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(form).entries());
            btn.disabled = true; document.querySelector('.btn-text').style.display = 'none'; document.getElementById('submitSpinner').style.display = 'block';
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'text/plain;charset=utf-8'} });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast("Đã lưu giao dịch");
                    const d = document.getElementById('date').value; form.reset(); document.getElementById('date').value = d;
                    fetchTransactions();
                } else throw new Error(result.message);
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false; document.querySelector('.btn-text').style.display = 'block'; document.getElementById('submitSpinner').style.display = 'none';
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', fetchTransactions);
    </script>
</body>
</html>
