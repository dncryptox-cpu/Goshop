<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker | DNC Premium</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Icons & Charts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS Variables - Zen Theme */
        :root {
            --bg-color: #030303;
            --surface-color: rgba(15, 15, 15, 0.5);
            --surface-hover: rgba(20, 20, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(255, 255, 255, 0.15);

            --text-primary: #FAFAFA;
            --text-secondary: #888888;
            --text-muted: #666666;

            --accent: #00F0FF; /* Cyan */
            --accent-gradient: linear-gradient(135deg, #00F0FF 0%, #00A86B 100%);
            --success: #00A86B; /* Green */
            --danger: #f43f5e;

            --radius-sm: 8px;
            --radius-md: 24px;
            --radius-lg: 24px;

            --shadow-glass: 0 30px 60px -20px rgba(0,0,0,0.8);
            --shadow-glow: 0 0 20px rgba(0, 240, 255, 0.15);

            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset & Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            ::selection {
                background-color: rgba(0, 240, 255, 0.3);
            }
        }

        /* Grid Background - Technical feel */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 0%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at top, black 20%, transparent 80%);
            z-index: -2;
            pointer-events: none;
        }

        /* Ambient Glowing Orbs - Spiritual/Energy feel */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: -1;
            animation: float 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .orb-1 { width: 45vw; height: 45vw; background: #00F0FF; top: -10%; left: -10%; }
        .orb-2 { width: 40vw; height: 40vw; background: #00A86B; bottom: 10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        /* Noise Overlay for Texture */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 999;
            pointer-events: none;
        }

        /* Typography */
        h1,
        h2,
        h3 {
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.5px;
        }

        /* Layout */
        .container {
            max-w-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            max-width: 1200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .brand-title {
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        /* Magic Mouse Glow */
        .card::after, .form-section::after, .list-section::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(255,255,255,0.06), transparent 40%);
            z-index: 0;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        
        .card:hover::after, .form-section:hover::after, .list-section:hover::after {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glass);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            z-index: 2;
        }

        .card.balance::before {
            background: var(--accent-gradient);
        }

        .card.income::before {
            background: var(--success);
        }

        .card.expense::before {
            background: var(--danger);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .card-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .card.income .card-value {
            color: var(--success);
        }

        .card.expense .card-value {
            color: var(--danger);
        }

        /* Main Content Split */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Form Area */
        .form-section {
            background: var(--surface-color);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 2rem;
            height: fit-content;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .form-section:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glass);
        }

        .form-section > * {
            position: relative;
            z-index: 1;
        }

        .form-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .radio-group {
            display: flex;
            gap: 1rem;
        }

        .radio-label {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .radio-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            transition: var(--transition);
            font-weight: 500;
            color: var(--text-secondary);
        }

        .radio-label input:checked~.radio-button {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .radio-label.income input:checked~.radio-button {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .radio-label.expense input:checked~.radio-button {
            border-color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* List Area */
        .list-section {
            background: var(--surface-color);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .list-section:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glass);
        }

        .list-section > * {
            position: relative;
            z-index: 1;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            font-size: 0.875rem;
        }

        .btn-refresh:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            max-height: 600px;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        .transaction-list::-webkit-scrollbar {
            width: 6px;
        }

        .transaction-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .transaction-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .transaction-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .transaction-item:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tx-icon.income {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .tx-icon.expense {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
        }

        .tx-details h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tx-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            align-items: center;
        }

        .tx-amount {
            font-family: 'Oswald', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .tx-amount.income {
            color: var(--success);
        }

        .tx-amount.expense {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state i {
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background: var(--surface-hover);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error i {
            color: var(--danger);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-overlay .spinner {
            display: block;
            width: 30px;
            height: 30px;
            border-width: 3px;
        }
    </style>
</head>

<body>

    <div class="noise"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container relative z-10">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="wallet" style="color: white; width: 20px; height: 20px;"></i>
                </div>
                <h1 class="brand-title">DNC FINANCE OS</h1>
            </div>
            <div>
                <span
                    style="font-size: 0.875rem; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color);">
                    <i data-lucide="shield-check"
                        style="width: 14px; height: 14px; display: inline; vertical-align: text-bottom; margin-right: 4px; color: var(--success);"></i>
                    Premium Secured
                </span>
            </div>
        </header>

        <!-- Dashboard Cards -->
        <div class="dashboard-grid">
            <div class="card balance">
                <div class="card-header">
                    <span>Tổng Số Dư</span>
                    <i data-lucide="credit-card" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalBalance">0đ</div>
            </div>
            <div class="card income">
                <div class="card-header">
                    <span>Tổng Thu</span>
                    <i data-lucide="arrow-down-right" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalIncome">0đ</div>
            </div>
            <div class="card expense">
                <div class="card-header">
                    <span>Tổng Chi</span>
                    <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                </div>
                <div class="card-value" id="totalExpense">0đ</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Left: Form -->
            <section class="form-section">
                <h2 class="form-title"><i data-lucide="plus-circle" class="text-accent"></i> Ghi Nhận Giao Dịch</h2>

                <form id="financeForm">
                    <div class="form-group">
                        <label class="form-label">Loại Giao Dịch</label>
                        <div class="radio-group">
                            <label class="radio-label income">
                                <input type="radio" name="type" value="Thu" required>
                                <div class="radio-button">
                                    <i data-lucide="arrow-down-circle" class="w-4 h-4"></i> Khoản Thu
                                </div>
                            </label>
                            <label class="radio-label expense">
                                <input type="radio" name="type" value="Chi" checked required>
                                <div class="radio-button">
                                    <i data-lucide="arrow-up-circle" class="w-4 h-4"></i> Khoản Chi
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="date">Ngày Giao Dịch</label>
                        <input type="date" id="date" name="date" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="category">Hạng Mục</label>
                        <select id="category" name="category" class="form-control" required>
                            <option value="" disabled selected>-- Chọn hạng mục --</option>
                            <optgroup label="Chi Phí">
                                <option value="Ăn uống">Ăn uống</option>
                                <option value="Di chuyển">Di chuyển</option>
                                <option value="Hóa đơn">Hóa đơn & Tiện ích</option>
                                <option value="Mua sắm">Mua sắm</option>
                                <option value="Giải trí">Giải trí</option>
                                <option value="Khác">Khác (Chi)</option>
                            </optgroup>
                            <optgroup label="Thu Nhập">
                                <option value="Lương">Tiền Lương</option>
                                <option value="Kinh doanh">Kinh doanh / Dự án</option>
                                <option value="Đầu tư">Đầu tư</option>
                                <option value="Khác">Khác (Thu)</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="amount">Số Tiền (VNĐ)</label>
                        <input type="number" id="amount" name="amount" class="form-control" placeholder="Ví dụ: 500000"
                            min="0" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="note">Ghi Chú (Tuỳ chọn)</label>
                        <textarea id="note" name="note" class="form-control" rows="3"
                            placeholder="Chi tiết giao dịch..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">Lưu Giao Dịch</span>
                        <div class="spinner" id="submitSpinner"></div>
                    </button>
                </form>
            </section>

            <!-- Right: List -->
            <section class="list-section">
                <div class="loading-overlay" id="listLoading">
                    <div class="spinner"></div>
                </div>

                <div class="list-header">
                    <h2 class="form-title" style="margin:0;"><i data-lucide="list" class="text-accent"></i> Giao Dịch
                        Gần Đây</h2>
                    <button class="btn-refresh" onclick="fetchTransactions()">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Làm Mới
                    </button>
                </div>

                <div class="transaction-list" id="transactionList">
                    <!-- Javascript sẽ render danh sách vào đây -->
                    <div class="empty-state">
                        <i data-lucide="inbox" class="w-12 h-12"></i>
                        <p>Đang tải dữ liệu...</p>
                    </div>
                </div>
            </section>

        </div>

        <!-- Reports Section -->
        <div class="reports-container" style="margin-top: 3rem;">
            <div class="list-header" style="margin-bottom: 1.5rem; background: var(--surface-color); padding: 1rem 1.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); backdrop-filter: blur(24px); position: relative; z-index: 1;">
                <h2 class="form-title" style="margin:0;"><i data-lucide="pie-chart" class="text-accent"></i> Báo Cáo Thống Kê</h2>
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                    <input type="date" id="filterStartDate" class="form-control" style="width: auto; padding: 0.5rem;">
                    <span style="color: var(--text-muted)">-</span>
                    <input type="date" id="filterEndDate" class="form-control" style="width: auto; padding: 0.5rem;">
                    <button class="btn-refresh" onclick="applyFilter()" style="background: var(--accent-gradient); color: #000; border: none; font-weight: bold; padding: 0.5rem 1rem;">
                        <i data-lucide="filter" class="w-4 h-4"></i> Lọc
                    </button>
                </div>
            </div>

            <!-- Charts Grid -->
            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); margin-bottom: 1.5rem;">
                <div class="card">
                    <div class="card-header">Theo Dõi Thu Chi</div>
                    <div style="position: relative; height: 250px; z-index: 1;"><canvas id="overviewChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header">Cơ Cấu Chi Phí</div>
                    <div style="position: relative; height: 250px; z-index: 1;"><canvas id="expenseChart"></canvas></div>
                </div>
            </div>

            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); margin-bottom: 1.5rem;">
                <div class="card">
                    <div class="card-header">Cơ Cấu Thu Nhập</div>
                    <div style="position: relative; height: 250px; z-index: 1;"><canvas id="incomeChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header">Tỷ Trọng Chi / Dư</div>
                    <div style="position: relative; height: 250px; display: flex; justify-content: center; z-index: 1;"><canvas id="ratioChart"></canvas></div>
                </div>
            </div>
            
            <!-- Breakdown Tables -->
            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));">
                <div class="card">
                    <div class="card-header" style="color: var(--success)">Bảng Kê Tổng Thu</div>
                    <div class="transaction-list" id="incomeTable" style="max-height: 300px; position: relative; z-index: 1;"></div>
                </div>
                <div class="card">
                    <div class="card-header" style="color: var(--danger)">Bảng Kê Tổng Chi</div>
                    <div class="transaction-list" id="expenseTable" style="max-height: 300px; position: relative; z-index: 1;"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Application Script -->
    <script>
        // Khởi tạo Icons
        lucide.createIcons();

        // CẤU HÌNH API GÓC TỪ GOOGLE APPS SCRIPT
        // Bạn cần thay thế chuỗi này bằng Web App URL của Apps Script vừa tạo
        const API_URL = "https://script.google.com/macros/s/AKfycbwNLNVPwzy5pg7M9-i_fledNhvtMQOGKFLSNmX4tp-0RDJgINEfiZuuVLzETfKVMJcs7A/exec"; // PLACEHOLDER

        // Format tiền tệ VNĐ
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        // Format Date (YYYY-MM-DD to DD/MM/YYYY)
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('vi-VN');
            } catch (e) {
                return dateStr;
            }
        };

        // Set ngày hiện tại cho form input
        document.getElementById('date').valueAsDate = new Date();

        // Xử lý thông báo Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icon = type === 'success' ? 'check-circle-2' : 'alert-circle';
            toast.innerHTML = `
                <i data-lucide="${icon}"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove sau 4s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Lấy danh sách giao dịch
        let allTransactions = [];

        async function fetchTransactions() {
            if (API_URL.includes("PLACEHOLDER")) {
                document.getElementById('transactionList').innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="alert-triangle" class="w-12 h-12" style="color:var(--danger)"></i>
                        <p>Vui lòng cập nhật API_URL trong mã nguồn (index.html).</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            const loader = document.getElementById('listLoading');
            loader.classList.add('active');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response was not ok");

                const result = await response.json();

                if (result.status === 'success') {
                    allTransactions = result.data;
                    applyFilter(); // Filter & Render
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showToast("Lỗi khi tải dữ liệu: " + error.message, "error");
            } finally {
                loader.classList.remove('active');
            }
        }

        // Áp dụng bộ lọc Date
        function applyFilter() {
            const startStr = document.getElementById('filterStartDate').value;
            const endStr = document.getElementById('filterEndDate').value;
            
            let filtered = allTransactions;
            
            if (startStr) {
                const start = new Date(startStr).getTime();
                filtered = filtered.filter(tx => new Date(tx.date).getTime() >= start);
            }
            if (endStr) {
                // Add 1 day (86400000ms) to include the entire end date
                const end = new Date(endStr).getTime() + 86400000; 
                filtered = filtered.filter(tx => new Date(tx.date).getTime() < end);
            }

            renderDashboard(filtered);
            renderChartsAndTables(filtered);
        }

        // Render dữ liệu ra giao diện
        function renderDashboard(transactions) {
            let totalIncome = 0;
            let totalExpense = 0;

            const listContainer = document.getElementById('transactionList');
            listContainer.innerHTML = '';

            if (!transactions || transactions.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="inbox" class="w-12 h-12"></i>
                        <p>Chưa có giao dịch nào.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            transactions.forEach(tx => {
                const amount = Number(tx.amount) || 0;
                const isIncome = tx.type === 'Thu';

                if (isIncome) totalIncome += amount;
                else totalExpense += amount;

                // Create List Item
                const iconName = isIncome ? 'arrow-down-circle' : 'arrow-up-circle';
                const txClass = isIncome ? 'income' : 'expense';
                const sign = isIncome ? '+' : '-';

                const itemHTML = `
                    <div class="transaction-item">
                        <div class="tx-left">
                            <div class="tx-icon ${txClass}">
                                <i data-lucide="${iconName}"></i>
                            </div>
                            <div class="tx-details">
                                <h4>${tx.category || 'Không phân loại'}</h4>
                                <div class="tx-meta">
                                    <span><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${formatDate(tx.date)}</span>
                                    ${tx.note ? `<span>• ${tx.note}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="tx-amount ${txClass}">
                            ${sign}${formatCurrency(amount)}
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', itemHTML);
            });

            // Update Cards
            const balance = totalIncome - totalExpense;
            document.getElementById('totalIncome').innerText = formatCurrency(totalIncome);
            document.getElementById('totalExpense').innerText = formatCurrency(totalExpense);
            document.getElementById('totalBalance').innerText = formatCurrency(balance);

            // Xử lý màu số dư
            const balanceEl = document.getElementById('totalBalance');
            if (balance < 0) balanceEl.style.color = 'var(--danger)';
            else if (balance > 0) balanceEl.style.color = 'var(--success)';
            else balanceEl.style.color = 'var(--text-primary)';

            lucide.createIcons();
        }

        let charts = {};
        function renderChartsAndTables(transactions) {
            let totalThu = 0;
            let totalChi = 0;
            const thuMap = {};
            const chiMap = {};

            transactions.forEach(tx => {
                const amt = Number(tx.amount) || 0;
                const cat = tx.category || 'Khác';
                if (tx.type === 'Thu') {
                    totalThu += amt;
                    thuMap[cat] = (thuMap[cat] || 0) + amt;
                } else {
                    totalChi += amt;
                    chiMap[cat] = (chiMap[cat] || 0) + amt;
                }
            });

            // Destroy old charts
            ['overviewChart', 'expenseChart', 'incomeChart', 'ratioChart'].forEach(id => {
                if (charts[id]) charts[id].destroy();
            });

            Chart.defaults.color = '#888888';
            Chart.defaults.font.family = 'Inter';

            // 1. Overview Chart
            charts['overviewChart'] = new Chart(document.getElementById('overviewChart'), {
                type: 'bar',
                data: {
                    labels: ['Thu', 'Chi', 'Tiết Kiệm'],
                    datasets: [{
                        data: [totalThu, totalChi, totalThu - totalChi],
                        backgroundColor: ['rgba(0, 168, 107, 0.6)', 'rgba(244, 63, 94, 0.6)', 'rgba(0, 240, 255, 0.6)'],
                        borderColor: ['#00A86B', '#f43f5e', '#00F0FF'],
                        borderWidth: 1
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 2. Expense Chart
            charts['expenseChart'] = new Chart(document.getElementById('expenseChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(chiMap),
                    datasets: [{
                        data: Object.values(chiMap),
                        backgroundColor: 'rgba(244, 63, 94, 0.6)',
                        borderColor: '#f43f5e',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 3. Income Chart
            charts['incomeChart'] = new Chart(document.getElementById('incomeChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(thuMap),
                    datasets: [{
                        data: Object.values(thuMap),
                        backgroundColor: 'rgba(0, 168, 107, 0.6)',
                        borderColor: '#00A86B',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 4. Ratio Doughnut
            charts['ratioChart'] = new Chart(document.getElementById('ratioChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Chi Phí', 'Dư (Tiết Kiệm)'],
                    datasets: [{
                        data: [totalChi, Math.max(0, totalThu - totalChi)],
                        backgroundColor: ['rgba(244, 63, 94, 0.8)', 'rgba(0, 240, 255, 0.8)'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });

            // Render Breakdown Tables
            const incTable = document.getElementById('incomeTable');
            const expTable = document.getElementById('expenseTable');
            let incHtml = '';
            let expHtml = '';

            Object.entries(thuMap).sort((a, b) => b[1] - a[1]).forEach(([cat, amt]) => {
                incHtml += `<div class="transaction-item" style="padding: 0.75rem 1rem;"><div class="tx-left"><div class="tx-details"><h4>${cat}</h4></div></div><div class="tx-amount income">+${formatCurrency(amt)}</div></div>`;
            });

            Object.entries(chiMap).sort((a, b) => b[1] - a[1]).forEach(([cat, amt]) => {
                expHtml += `<div class="transaction-item" style="padding: 0.75rem 1rem;"><div class="tx-left"><div class="tx-details"><h4>${cat}</h4></div></div><div class="tx-amount expense">-${formatCurrency(amt)}</div></div>`;
            });

            incTable.innerHTML = incHtml || '<p style="color: var(--text-muted); text-align: center;">Chưa có dữ liệu thu.</p>';
            expTable.innerHTML = expHtml || '<p style="color: var(--text-muted); text-align: center;">Chưa có dữ liệu chi.</p>';
        }

        // Xử lý Submit Form
        document.getElementById('financeForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (API_URL.includes("PLACEHOLDER")) {
                showToast("Vui lòng cập nhật API_URL trước khi lưu!", "error");
                return;
            }

            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.querySelector('.btn-text');
            const spinner = document.getElementById('submitSpinner');

            // Lấy dữ liệu form
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // UI Loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error("Không thể kết nối đến máy chủ");

                const result = await response.json();

                if (result.status === 'success') {
                    showToast(result.message, 'success');
                    // Reset form fields except date
                    const currDate = document.getElementById('date').value;
                    form.reset();
                    document.getElementById('date').value = currDate;
                    // Tải lại dữ liệu mới
                    fetchTransactions();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Submit Error:", error);
                showToast("Lỗi: " + error.message, 'error');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });

        // Thêm Script cho Mouse Glow Effect
        document.querySelectorAll('.card, .form-section, .list-section').forEach(el => {
            el.addEventListener('mousemove', e => {
                const rect = el.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                el.style.setProperty('--mouse-x', `${x}px`);
                el.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Tải dữ liệu lần đầu khi trang load xong
        document.addEventListener('DOMContentLoaded', fetchTransactions);
    </script>
</body>

</html>
