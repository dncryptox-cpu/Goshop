                        <!-- MODULE: REFUNDS -->
                        <div x-show="activeModule === 'refunds'" class="h-full flex flex-col p-6 overflow-y-auto">
                            <div class="mb-8">
                                <h2 class="text-2xl font-black text-gray-900 tracking-tight flex items-center gap-2">
                                    <i data-lucide="banknote" class="w-6 h-6 text-emerald-500"></i>
                                    Tính Toán Hoàn Tiền
                                </h2>
                                <p class="text-gray-500 mt-1">Công cụ tính toán số tiền cần hoàn trả cho khách hàng dựa trên thời gian đã sử dụng.</p>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 max-w-5xl">
                                <!-- Form Đầu Vào -->
                                <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
                                    <h3 class="font-bold text-gray-800 mb-6 flex items-center gap-2 border-b border-gray-100 pb-3">
                                        <i data-lucide="file-edit" class="w-4 h-4 text-gray-400"></i>
                                        Thông tin đơn hàng
                                    </h3>
                                    
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Sản phẩm</label>
                                            <input type="text" x-model="refundCalc.product" placeholder="VD: Youtube Premium 6 Tháng" class="w-full border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Số tiền khách đã trả (VNĐ)</label>
                                            <input type="number" x-model.number="refundCalc.amountPaid" placeholder="VD: 250000" class="w-full border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all font-mono">
                                        </div>

                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Ngày mua</label>
                                                <input type="date" x-model="refundCalc.purchaseDate" class="w-full border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                                            </div>
                                            <div>
                                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Số tháng đã mua</label>
                                                <input type="number" x-model.number="refundCalc.monthsBought" placeholder="VD: 6" class="w-full border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Ngày hoàn tiền</label>
                                            <input type="date" x-model="refundCalc.refundDate" class="w-full border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                                        </div>
                                        
                                        <div class="pt-4 mt-2 border-t border-gray-100">
                                            <button @click="resetRefundCalc()" class="w-full py-2.5 text-sm font-bold text-gray-500 hover:text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-lg transition-all">
                                                Làm mới form
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Kết Quả -->
                                <div class="bg-emerald-50 rounded-2xl border border-emerald-100 p-6 flex flex-col">
                                    <h3 class="font-bold text-emerald-800 mb-6 flex items-center gap-2 border-b border-emerald-200/50 pb-3">
                                        <i data-lucide="calculator" class="w-4 h-4 text-emerald-600"></i>
                                        Kết quả tính toán
                                    </h3>
                                    
                                    <template x-if="calculatedRefund">
                                        <div class="flex-1 flex flex-col justify-between">
                                            <div class="space-y-4">
                                                <div class="flex justify-between items-center p-3 bg-white/60 rounded-lg">
                                                    <span class="text-sm text-emerald-700 font-medium">Thời gian đã dùng:</span>
                                                    <span class="text-sm font-bold text-emerald-900" x-text="`${calculatedRefund.usedDays} ngày (~${calculatedRefund.usedMonths} tháng)`"></span>
                                                </div>
                                                <div class="flex justify-between items-center p-3 bg-white/60 rounded-lg">
                                                    <span class="text-sm text-emerald-700 font-medium">Chi phí đã dùng:</span>
                                                    <span class="text-sm font-bold text-red-600" x-text="formatCurrency(calculatedRefund.usedAmount)"></span>
                                                </div>
                                                <div class="flex justify-between items-center p-3 bg-white/60 rounded-lg">
                                                    <span class="text-sm text-emerald-700 font-medium">Đơn giá tham chiếu:</span>
                                                    <span class="text-sm font-bold text-emerald-900" x-text="`${formatCurrency(calculatedRefund.pricePerDay)}/ngày`"></span>
                                                </div>
                                            </div>
                                            
                                            <div class="mt-8 pt-6 border-t border-emerald-200/50 text-center">
                                                <p class="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2">Số tiền cần hoàn lại</p>
                                                <p class="text-5xl font-black text-emerald-600 font-mono tracking-tight" x-text="formatCurrency(calculatedRefund.refundAmount)"></p>
                                                
                                                <button @click="copyRefundInfo()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all shadow-lg shadow-emerald-500/20">
                                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                                    Copy thông tin gửi khách
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <template x-if="!calculatedRefund">
                                        <div class="flex-1 flex flex-col items-center justify-center text-center p-6">
                                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-4">
                                                <i data-lucide="receipt" class="w-8 h-8 text-emerald-200"></i>
                                            </div>
                                            <p class="text-emerald-700 font-medium text-sm">Vui lòng nhập đầy đủ thông tin bên trái để tự động tính toán số tiền hoàn lại.</p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
