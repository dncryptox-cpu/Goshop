name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (FIRE OS)
        run: npm install
        working-directory: ./fire

      - name: Build Next.js (FIRE OS)
        run: npm run build
        working-directory: ./fire

      - name: Prepare Deployment Artifact
        run: |
          mkdir _site
          # Copy everything except fire directory and hidden git files
          rsync -av --exclude='fire' --exclude='_site' --exclude='.git' --exclude='.github' ./ _site/
          # Copy the built Next.js export into the fire subpath
          mkdir -p _site/fire
          cp -a fire/out/. _site/fire/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
