name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build FIRE OS (Next.js)
        run: |
          cd fos
          # Xóa middleware vì Github Pages không hỗ trợ Server-Side Rendering
          rm -f middleware.ts lib/supabase/server.ts lib/supabase/middleware.ts
          npm install
          npm run build
          # Di chuyển file tĩnh (HTML/CSS/JS) ra ngoài thư mục fos
          mv out temp_out
          rm -rf *
          mv temp_out/* .
          rm -rf temp_out
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository since index.html is at the root
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
