<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMM100 Tracker | Premium Ultra Runner</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --bg-color: #0b0b0d; /* Rất tối, tạo chiều sâu */
            --surface-color: #16161a;
            --surface-hover: #1f1f24;
            --primary-accent: #ff5722; /* Neon Orange đậm chất Trail/VMM */
            --secondary-accent: #00e676; /* Neon Green thể hiện tiến độ */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-radius: 16px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Oswald', sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 30px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Gradient Text */
            background: linear-gradient(90deg, var(--text-main), var(--primary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* --- Hero Dashboard --- */
        .hero-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .hero-dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            background-color: var(--surface-hover);
            transform: translateY(-5px);
            border-color: rgba(255, 87, 34, 0.2);
            box-shadow: 0 15px 40px rgba(255, 87, 34, 0.05);
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-accent);
        }

        /* --- Countdown Timer --- */
        .countdown-timer {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .time-box {
            flex: 1;
            background: rgba(255, 87, 34, 0.05);
            border: 1px solid rgba(255, 87, 34, 0.2);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            transition: var(--transition);
        }

        .time-box:hover {
            border-color: var(--primary-accent);
            background: rgba(255, 87, 34, 0.1);
        }

        .time-value {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-accent);
            line-height: 1;
        }

        .time-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* --- Weight Progress --- */
        .weight-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            font-family: var(--font-display);
        }

        .current-weight {
            font-size: 2.5rem;
            line-height: 1;
            color: var(--text-main);
        }

        .target-weight {
            font-size: 1.5rem;
            line-height: 1;
            color: var(--secondary-accent);
            opacity: 0.8;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            width: 0%; /* Sẽ được set bởi JavaScript */
            border-radius: 5px;
            transition: width 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }

        .weight-status {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .weight-status span strong {
            color: var(--text-main);
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>VMM100 Tracker</h1>
            <p>Road to Vietnam Mountain Marathon 2026</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Hero Dashboard: Countdown & Weight -->
            <section class="hero-dashboard">
                
                <!-- Card 1: Countdown -->
                <div class="card">
                    <h2 class="section-title">Race Countdown</h2>
                    <div class="countdown-timer" id="countdown">
                        <div class="time-box">
                            <div class="time-value" id="days">00</div>
                            <div class="time-label">Ngày</div>
                        </div>
                        <div class="time-box">
                            <div class="time-value" id="hours">00</div>
                            <div class="time-label">Giờ</div>
                        </div>
                        <div class="time-box">
                            <div class="time-value" id="mins">00</div>
                            <div class="time-label">Phút</div>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Weight Progress -->
                <div class="card">
                    <h2 class="section-title">Weight Tracking</h2>
                    <div class="weight-info">
                        <div class="current-weight">59<span style="font-size: 1rem; color: var(--text-muted)">kg</span></div>
                        <div class="target-weight">63<span style="font-size: 0.8rem">kg</span></div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="weight-progress"></div>
                    </div>
                    <div class="weight-status">
                        <span>Mục tiêu: <strong>+0.3kg/tuần</strong></span>
                        <span>Hoàn thành: <strong id="weight-percent">0%</strong></span>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // -----------------------------------------
        // 1. COUNTDOWN LOGIC (Target: 17/09/2026)
        // -----------------------------------------
        const raceDate = new Date('2026-09-17T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = raceDate - now;

            // Nếu đã đến hoặc qua ngày Race
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = 
                    "<div style='text-align:center; width:100%; font-family:var(--font-display); font-size:2rem; color:var(--secondary-accent);'>RACE DAY! LET'S GO!</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("mins").innerText = mins.toString().padStart(2, '0');
        }

        // Cập nhật ngay lập tức & set interval mỗi giây
        updateCountdown();
        setInterval(updateCountdown, 1000);


        // -----------------------------------------
        // 2. WEIGHT PROGRESS BAR LOGIC
        // -----------------------------------------
        const startWeight = 57; // Giả sử cân nặng lúc bắt đầu campaign là 57kg
        const currentWeight = 59; // Lấy từ Google Sheets sau
        const targetWeight = 63;

        function updateWeightProgress() {
            const totalToGain = targetWeight - startWeight;
            const gained = currentWeight - startWeight;
            
            let percentage = (gained / totalToGain) * 100;
            // Đảm bảo % không vượt quá 100 hoặc nhỏ hơn 0
            percentage = Math.max(0, Math.min(percentage, 100));
            
            // Animation fill bar sau 500ms để người dùng thấy hiệu ứng mượt
            setTimeout(() => {
                document.getElementById('weight-progress').style.width = percentage + '%';
                document.getElementById('weight-percent').innerText = Math.round(percentage) + '%';
            }, 500);
        }

        updateWeightProgress();

    </script>
</body>
</html>
