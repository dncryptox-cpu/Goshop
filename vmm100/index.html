<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMM100 Tracker | Premium Ultra Runner</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --bg-color: #0b0b0d; /* Rất tối, tạo chiều sâu */
            --surface-color: #16161a;
            --surface-hover: #1f1f24;
            --primary-accent: #ff5722; /* Neon Orange đậm chất Trail/VMM */
            --secondary-accent: #00e676; /* Neon Green thể hiện tiến độ */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-radius: 16px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Oswald', sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 30px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Gradient Text */
            background: linear-gradient(90deg, var(--text-main), var(--primary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* --- Hero Dashboard --- */
        .hero-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .hero-dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            background-color: var(--surface-hover);
            transform: translateY(-5px);
            border-color: rgba(255, 87, 34, 0.2);
            box-shadow: 0 15px 40px rgba(255, 87, 34, 0.05);
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-accent);
        }

        /* --- Countdown Timer --- */
        .countdown-timer {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .time-box {
            flex: 1;
            background: rgba(255, 87, 34, 0.05);
            border: 1px solid rgba(255, 87, 34, 0.2);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            transition: var(--transition);
        }

        .time-box:hover {
            border-color: var(--primary-accent);
            background: rgba(255, 87, 34, 0.1);
        }

        .time-value {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-accent);
            line-height: 1;
        }

        .time-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* --- Weight Progress --- */
        .weight-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            font-family: var(--font-display);
        }

        .current-weight {
            font-size: 2.5rem;
            line-height: 1;
            color: var(--text-main);
        }

        .target-weight {
            font-size: 1.5rem;
            line-height: 1;
            color: var(--secondary-accent);
            opacity: 0.8;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            width: 0%; /* Sẽ được set bởi JavaScript */
            border-radius: 5px;
            transition: width 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }

        .weight-status {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .weight-status span strong {
            color: var(--text-main);
        }

        /* --- Data Grids & Logs --- */
        .log-section {
            margin-top: 50px;
            width: 100%;
        }

        .log-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            .log-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        .log-card {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .log-card:hover {
            background-color: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .log-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        /* Training metrics */
        .training-metrics {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric {
            display: flex;
            flex-direction: column;
        }

        .metric-value {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--primary-accent);
            line-height: 1.2;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Nutrition log */
        .nutrition-menu {
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: var(--text-main);
            line-height: 1.6;
            flex-grow: 1;
        }

        .nutrition-macros {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .macro-item {
            font-size: 0.75rem;
            text-align: center;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .macro-item span {
            display: block;
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin-bottom: 2px;
        }
        .protein span { color: #ffeb3b; } /* Vàng */
        .carb span { color: #03a9f4; }    /* Xanh dương */
        .fat span { color: #e91e63; }     /* Hồng */

        /* Skeleton Loading */
        .skeleton {
            animation: skeleton-loading 1s linear infinite alternate;
        }

        @keyframes skeleton-loading {
            0% { background-color: rgba(255,255,255,0.02); }
            100% { background-color: rgba(255,255,255,0.06); }
        }

        .skeleton-text {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>VMM100 Tracker</h1>
            <p>Road to Vietnam Mountain Marathon 2026</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Hero Dashboard: Countdown & Weight -->
            <section class="hero-dashboard">
                
                <!-- Card 1: Countdown -->
                <div class="card">
                    <h2 class="section-title">Race Countdown</h2>
                    <div class="countdown-timer" id="countdown">
                        <div class="time-box">
                            <div class="time-value" id="days">00</div>
                            <div class="time-label">Ngày</div>
                        </div>
                        <div class="time-box">
                            <div class="time-value" id="hours">00</div>
                            <div class="time-label">Giờ</div>
                        </div>
                        <div class="time-box">
                            <div class="time-value" id="mins">00</div>
                            <div class="time-label">Phút</div>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Weight Progress -->
                <div class="card">
                    <h2 class="section-title">Weight Tracking</h2>
                    <div class="weight-info">
                        <div class="current-weight"><span id="current-weight-val">--</span><span style="font-size: 1rem; color: var(--text-muted)">kg</span></div>
                        <div class="target-weight">63<span style="font-size: 0.8rem">kg</span></div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="weight-progress"></div>
                    </div>
                    <div class="weight-status">
                        <span>Mục tiêu: <strong>+0.3kg/tuần</strong></span>
                        <span>Hoàn thành: <strong id="weight-percent">0%</strong></span>
                    </div>
                </div>

            </section>

            <!-- Training Log Section -->
            <section class="log-section">
                <h2 class="section-title">Nhật ký Tập luyện</h2>
                <div class="log-grid" id="training-container">
                    <!-- Skeleton Loader -->
                    <div class="log-card skeleton">
                        <div class="skeleton-text" style="height: 20px; width: 40%;"></div>
                        <div class="skeleton-text" style="height: 60px; margin-top: 15px;"></div>
                    </div>
                    <div class="log-card skeleton">
                        <div class="skeleton-text" style="height: 20px; width: 40%;"></div>
                        <div class="skeleton-text" style="height: 60px; margin-top: 15px;"></div>
                    </div>
                </div>
            </section>

            <!-- Nutrition Log Section -->
            <section class="log-section">
                <h2 class="section-title">Nhật ký Dinh dưỡng</h2>
                <div class="log-grid" id="nutrition-container">
                    <!-- Skeleton Loader -->
                    <div class="log-card skeleton">
                        <div class="skeleton-text" style="height: 20px; width: 60%;"></div>
                        <div class="skeleton-text" style="height: 40px;"></div>
                        <div class="skeleton-text" style="height: 60px; margin-top: 15px;"></div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script>
        // -----------------------------------------
        // 1. COUNTDOWN LOGIC (Target: 17/09/2026)
        // -----------------------------------------
        const raceDate = new Date('2026-09-17T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = raceDate - now;

            // Nếu đã đến hoặc qua ngày Race
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = 
                    "<div style='text-align:center; width:100%; font-family:var(--font-display); font-size:2rem; color:var(--secondary-accent);'>RACE DAY! LET'S GO!</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("mins").innerText = mins.toString().padStart(2, '0');
        }

        // Cập nhật ngay lập tức & set interval mỗi giây
        updateCountdown();
        setInterval(updateCountdown, 1000);


        // -----------------------------------------
        // 2. WEIGHT PROGRESS BAR LOGIC
        // -----------------------------------------
        const startWeight = 57; // Giả sử cân nặng lúc bắt đầu campaign là 57kg
        const targetWeight = 63;

        function updateWeightProgress(currentW) {
            document.getElementById('current-weight-val').innerText = currentW;
            const totalToGain = targetWeight - startWeight;
            const gained = currentW - startWeight;
            
            let percentage = (gained / totalToGain) * 100;
            // Đảm bảo % không vượt quá 100 hoặc nhỏ hơn 0
            percentage = Math.max(0, Math.min(percentage, 100));
            
            // Animation fill bar sau 500ms để người dùng thấy hiệu ứng mượt
            setTimeout(() => {
                document.getElementById('weight-progress').style.width = percentage + '%';
                document.getElementById('weight-percent').innerText = Math.round(percentage) + '%';
            }, 500);
        }


        // -----------------------------------------
        // 3. FETCH GOOGLE SHEETS DATA (Visualization API)
        // -----------------------------------------
        const SHEET_ID = '10F8JjAIK8UjWJGuO3TUxaWMoeQZn5S30V79Q5kIn-mI';
        
        async function fetchSheetData(sheetName) {
            // Sử dụng Google Visualization API để lấy JSON mà không cần Auth (yêu cầu sheet phải public)
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                // API trả về JSON được bọc trong 1 function gọi callback, ta cần cắt text để lấy JSON parseable
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                return data.table;
            } catch (error) {
                console.error(`Lỗi fetch data từ sheet ${sheetName}:`, error);
                return null;
            }
        }

        function renderTrainingLog(table) {
            const container = document.getElementById('training-container');
            container.innerHTML = ''; // Clear skeleton
            
            if (!table || !table.rows || table.rows.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted)">Chưa có dữ liệu tập luyện.</p>';
                return;
            }

            // Gviz tự gộp dòng 1 thành Header column (table.cols), dữ liệu bắt đầu từ dòng 2 nằm trong table.rows
            table.rows.forEach(row => {
                const cells = row.c;
                if (!cells || !cells[0] || cells[0].v === null) return; // Bỏ qua dòng trống

                // Format: A:Date, B:Km, C:Elevation, D:Time, E:Đánh giá
                let dateStr = cells[0].f || cells[0].v;
                const km = cells[1] && cells[1].v !== null ? cells[1].v : 0;
                const elev = cells[2] && cells[2].v !== null ? cells[2].v : 0;
                const time = cells[3] && cells[3].v !== null ? (cells[3].f || cells[3].v) : '00:00';
                const evalTraining = cells[4] && cells[4].v ? cells[4].v : '';

                const cardHtml = `
                    <div class="log-card">
                        <div class="log-date">${dateStr}</div>
                        <div class="training-metrics">
                            <div class="metric">
                                <span class="metric-value">${km}</span>
                                <span class="metric-label">Km</span>
                            </div>
                            <div class="metric">
                                <span class="metric-value">${elev}</span>
                                <span class="metric-label">Elev (m)</span>
                            </div>
                            <div class="metric">
                                <span class="metric-value" style="color:var(--text-main)">${time}</span>
                                <span class="metric-label">Time</span>
                            </div>
                        </div>
                        ${evalTraining ? `<div style="margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.05); font-size:0.85rem; color:var(--text-muted); font-style:italic;">"${evalTraining.replace(/\n/g, '<br/>')}"</div>` : ''}
                    </div>
                `;
                // Nối thẻ mới lên đầu (để ngày mới nhất hiện lên trước)
                container.insertAdjacentHTML('afterbegin', cardHtml);
            });
        }

        function renderNutritionLog(table) {
            const container = document.getElementById('nutrition-container');
            container.innerHTML = ''; // Clear skeleton
            
            if (!table || !table.rows || table.rows.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted)">Chưa có dữ liệu dinh dưỡng.</p>';
                return;
            }

            // Format: A:Date, B:Menu(Hidden), C:Kcal, D:Protein, E:Carb, F:Fat, G:Đánh giá
            table.rows.forEach(row => {
                const cells = row.c;
                if (!cells || !cells[0] || cells[0].v === null) return;

                let dateStr = cells[0].f || cells[0].v;
                const kcal = cells[2] && cells[2].v !== null ? cells[2].v : 0;
                const protein = cells[3] && cells[3].v !== null ? cells[3].v : 0;
                const carb = cells[4] && cells[4].v !== null ? cells[4].v : 0;
                const fat = cells[5] && cells[5].v !== null ? cells[5].v : 0;
                const evalNutrition = cells[6] && cells[6].v ? cells[6].v : '';

                const targetKcal = 3600;
                const kcalPercent = Math.min(100, Math.round((kcal / targetKcal) * 100));

                const cardHtml = `
                    <div class="log-card">
                        <div class="log-date" style="display:flex; justify-content:space-between;">
                            <span>${dateStr}</span>
                            <span style="color:var(--secondary-accent)">${kcalPercent}% Mục tiêu</span>
                        </div>
                        <div class="nutrition-menu" style="font-style:italic; color:var(--text-muted);">
                            ${evalNutrition ? `"${evalNutrition.replace(/\n/g, '<br/>')}"` : 'Chưa có đánh giá'}
                        </div>
                        
                        <div style="margin-bottom:10px;">
                            <div class="metric-label" style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>Tổng Năng Lượng</span>
                                <span><strong style="color:var(--text-main);font-size:1rem;">${kcal}</strong> / ${targetKcal} Kcal</span>
                            </div>
                            <div class="progress-bar-container" style="height:6px; background:rgba(255,255,255,0.05)">
                                <div class="progress-bar-fill" style="width:${kcalPercent}%; background:var(--secondary-accent); box-shadow:none;"></div>
                            </div>
                        </div>

                        <div class="nutrition-macros">
                            <div class="macro-item protein"><span>${protein}g</span>Protein</div>
                            <div class="macro-item carb"><span>${carb}g</span>Carb</div>
                            <div class="macro-item fat"><span>${fat}g</span>Fat</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('afterbegin', cardHtml);
            });
        }

        async function initDataFetching() {
            // Đợi 1 chút để user cảm nhận đc skeleton loading nếu thích, hoặc fetch ngay
            const weightTable = await fetchSheetData('CAN_NANG');
            if (weightTable && weightTable.rows && weightTable.rows.length > 0) {
                // Lấy dòng cuối cùng có dữ liệu (ưu tiên data mới nhất)
                let latestWeight = 57;
                for (let i = weightTable.rows.length - 1; i >= 0; i--) {
                    const row = weightTable.rows[i];
                    if (row.c && row.c[1] && row.c[1].v !== null) {
                        latestWeight = row.c[1].v;
                        break;
                    }
                }
                updateWeightProgress(latestWeight);
            } else {
                updateWeightProgress(57); // Default nếu lỗi
            }

            const trainingTable = await fetchSheetData('TAP_LUYEN');
            if(trainingTable) renderTrainingLog(trainingTable);
            else document.getElementById('training-container').innerHTML = '<p style="color:#ff5722; font-size:0.9rem;">Lỗi kết nối hoặc Sheet chưa Public. Hãy mở quyền "Anyone with the link".</p>';

            const nutritionTable = await fetchSheetData('DINH_DUONG');
            if(nutritionTable) renderNutritionLog(nutritionTable);
            else document.getElementById('nutrition-container').innerHTML = '<p style="color:#ff5722; font-size:0.9rem;">Lỗi kết nối hoặc Sheet chưa Public. Hãy mở quyền "Anyone with the link".</p>';
        }

        // Bắt đầu fetch dữ liệu
        initDataFetching();

    </script>
</body>
</html>
