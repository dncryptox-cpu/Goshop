                            <tbody>
                                {mockAffiliates.map((aff) => (
                                    <tr key={aff.id} className="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                                        <td className="px-6 py-4 font-mono text-xs text-blue-400">{aff.id}</td>
                                        <td className="px-6 py-4 font-bold text-white">{aff.name}</td>
                                        <td className="px-6 py-4 text-center">
                                            <span className="bg-white/10 px-3 py-1 rounded-full text-xs border border-white/10">{aff.referrals}</span>
                                        </td>
                                        <td className="px-6 py-4 text-right text-emerald-400">{formatCurrency(aff.revenue)}</td>
                                        <td className="px-6 py-4 text-right font-bold text-purple-400">{formatCurrency(aff.commission)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const TradingJournalView = () => {
            const winRate = (mockTrades.filter(t => t.status === 'Win').length / mockTrades.length) * 100;
            return (
                <div className="p-8 animate-[fadeIn_0.3s_ease-out] space-y-6">
                    <div className="flex gap-6 mb-6">
                        <div className="glass-card p-6 flex-1 flex items-center justify-between">
                            <div>
                                <p className="text-sm text-slate-400">Win Rate</p>
                                <h3 className="text-3xl font-black text-white mt-1">{winRate.toFixed(1)}%</h3>
                            </div>
                            <div className="w-16 h-16 rounded-full border-4 border-emerald-500/30 border-t-emerald-500 flex items-center justify-center rotate-45"></div>
                        </div>
                        <div className="glass-card p-6 flex-1">
                            <p className="text-sm text-slate-400">Tổng R (Lợi nhuận)</p>
                            <h3 className="text-3xl font-black text-emerald-400 mt-1">+5.5R</h3>
                        </div>
                    </div>

                    <div className="glass-card overflow-hidden">
                        <div className="p-6 border-b border-white/5 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-white">Nhật Ký Giao Dịch</h3>
                            <button className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
                                <i className="fa-solid fa-plus mr-2"></i> Thêm Lệnh
                            </button>
                        </div>
                        <table className="w-full text-left text-sm text-slate-300">
                            <thead className="bg-white/5 text-xs uppercase text-slate-400">
                                <tr>
                                    <th className="px-6 py-4">Ngày</th>
                                    <th className="px-6 py-4">Cặp Giao Dịch</th>
                                    <th className="px-6 py-4">Vị thế</th>
                                    <th className="px-6 py-4">Entry</th>
                                    <th className="px-6 py-4">SL</th>
                                    <th className="px-6 py-4 text-center">Rủi ro</th>
                                    <th className="px-6 py-4 text-right">Kết quả</th>
                                </tr>
                            </thead>
                            <tbody>
                                {mockTrades.map((t) => (
                                    <tr key={t.id} className="border-b border-white/5 hover:bg-white/[0.02]">
                                        <td className="px-6 py-4">{t.date}</td>
                                        <td className="px-6 py-4 font-bold text-white">{t.pair}</td>
                                        <td className="px-6 py-4">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${t.type === 'Long' ? 'text-emerald-400 bg-emerald-500/10' : 'text-red-400 bg-red-500/10'}`}>{t.type}</span>
                                        </td>
                                        <td className="px-6 py-4 font-mono">{t.entry}</td>
                                        <td className="px-6 py-4 font-mono">{t.sl}</td>
                                        <td className="px-6 py-4 text-center">{t.risk}%</td>
                                        <td className={`px-6 py-4 text-right font-bold ${t.result > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                            {t.result > 0 ? '+' : ''}{t.result}R
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const GoalsView = () => (
            <div className="p-8 animate-[fadeIn_0.3s_ease-out] space-y-6">
                <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold text-white">Mục Tiêu Tài Chính</h2>
                    <button className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
                        Tạo Mục Tiêu Mới
                    </button>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {mockGoals.map(goal => {
                        const progress = (goal.current / goal.target) * 100;
                        return (
                            <div key={goal.id} className="glass-card p-6 flex flex-col justify-between h-48 group hover:-translate-y-1 transition-transform">
                                <div>
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="text-base font-bold text-white">{goal.name}</h3>
                                        <span className="text-xs font-bold text-slate-400 bg-white/5 px-2 py-1 rounded-md border border-white/10">{progress.toFixed(0)}%</span>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-1">Đã đạt {formatCurrency(goal.current)}</p>
                                </div>
                                
                                <div className="mt-6">
                                    <div className="flex justify-between text-[10px] text-slate-500 mb-2 uppercase font-bold tracking-wider">
                                        <span>Tiến độ</span>
                                        <span>Mục tiêu: {formatCurrency(goal.target)}</span>
                                    </div>
                                    <div className="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden border border-white/5">
                                        <div className={`${goal.color} h-2.5 rounded-full transition-all duration-1000 ease-out`} style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>
                            </div>
                        )
                    })}
                </div>
            </div>
        );

        const LoginScreen = ({ onLogin }) => (
            <div className="min-h-screen flex items-center justify-center p-4">
                <div className="glass-card p-10 w-full max-w-md text-center border-t border-t-blue-500/30">
                    <div className="w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20 mx-auto mb-6">
                        <i className="fa-solid fa-infinity text-white text-2xl"></i>
                    </div>
                    <h1 className="text-3xl font-black text-white mb-2 tracking-tight">Finance OS</h1>
                    <p className="text-slate-400 text-sm mb-8">Hệ điều hành tài chính cá nhân & kinh doanh</p>
                    
                    <button onClick={onLogin} className="w-full bg-white text-slate-900 hover:bg-slate-100 px-6 py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-3 shadow-xl">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" className="w-5 h-5" />
                        Đăng nhập với Google
                    </button>
                    
                    <p className="text-xs text-slate-500 mt-8">Bảo mật tuyệt đối bởi Supabase Auth</p>
                </div>
            </div>
        );

        // --- Main App Component ---
        const App = () => {
            const [session, setSession] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');

            // Simulate login for Demo purposes since no Supabase credentials provided yet
            const handleLogin = () => {
                setSession({ user: { email: 'admin@godnc.com' } });
            };

            if (!session) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            const getTitle = () => {
                switch(activeTab) {
                    case 'dashboard': return 'Tổng Quan Tài Chính';
                    case 'transactions': return 'Quản Lý Giao Dịch';
                    case 'business': return 'Hệ Thống Goshop';
                    case 'affiliate': return 'Đối Tác & CTV';
                    case 'trading': return 'Nhật Ký Giao Dịch (Trading Journal)';
                    case 'goals': return 'Mục Tiêu Tài Chính';
                    default: return 'Dashboard';
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} setSession={setSession} />
                    
                    <div className="flex-1 flex flex-col h-full relative overflow-y-auto">
                        <Topbar title={getTitle()} />
                        
                        <main className="flex-1 max-w-7xl mx-auto w-full">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'transactions' && <TransactionsView />}
                            {activeTab === 'business' && <BusinessView />}
                            {activeTab === 'affiliate' && <AffiliateView />}
                            {activeTab === 'trading' && <TradingJournalView />}
                            {activeTab === 'goals' && <GoalsView />}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
